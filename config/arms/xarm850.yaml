# UFactory xArm 850 — 6-DOF, 850 mm reach.
# DH params from UFactory technical manual.
model: xarm850
dof: 6
payload_kg: 5.0
reach_mm: 850.0

# Modified DH (alpha_{i-1}, a_{i-1}, d_i, theta_i_offset)
dh:
  - { alpha:  0.0,    a:   0.0,   d: 364.0, theta_offset:   0.0 }
  - { alpha: -90.0,   a:   0.0,   d:   0.0, theta_offset: -90.0 }
  - { alpha:   0.0,   a: 425.0,   d:   0.0, theta_offset:   0.0 }
  - { alpha:   0.0,   a: 401.0,   d: 154.0, theta_offset:   0.0 }
  - { alpha: -90.0,   a:   0.0,   d:   0.0, theta_offset:   0.0 }
  - { alpha:  90.0,   a:   0.0,   d: 168.5, theta_offset:   0.0 }

joint_limits_deg:
  q1: [-360, 360]
  q2: [-118,  120]
  q3: [-225,   11]
  q4: [-360, 360]
  q5: [-97,  180]
  q6: [-360, 360]

joint_velocity_max_deg_s: [180, 180, 180, 360, 360, 360]
joint_accel_max_deg_s2:   [1145, 1145, 1145, 1145, 1145, 1145]

# Cartesian limits used by the on-board controller.
cartesian_velocity_max_mm_s: 1000.0
cartesian_accel_max_mm_s2: 20000.0

# Mount offset from base flange to Hemera nozzle tip, in tool frame.
# Set after on-bench calibration with calibrate.py.
tool_offset_mm: [0.0, 0.0, 95.0]
