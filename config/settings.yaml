
# IP addresses and hardware settings
arms:
  left:
    ip: "192.168.1.236"
  right:
    ip: "192.168.1.235"

moonraker:
  host: "192.168.1.100"   # Raspberry Pi IP
  port: 7125

turntable:
  controller_ip: "192.168.7.1"   # Aerotech iXC4 IP address
  axis: "U"       # if your MCU sends endstop state (future)


# Default motion & extrusion parameters
defaults:
  travel_speed: 150      # mm/s arm move when not extruding
  print_speed: 30        # mm/s arm move when extruding
  extrusion_feedrate: 5  # mm/s of filament (provisional, per your volcano/nozzle)
  temperature:
    tool0: 235           # Celsius
    tool1: 235

# Optional: software limits (arm coordinates)
limits:
  x: [100, 700]
  y: [-300, 300]
  z: [50, 500]